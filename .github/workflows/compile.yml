name: iPad Export
on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-runs-on: macos-14
    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Rebuild and Direct Compile Engine Core
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force
          
          # Move directly into the engine repo folder to generate the binary artifact layout
          cd llmfarm_core.swift
          chmod +x ./build-xcframework_cpu.sh
          ./build-xcframework_cpu.sh
          
          # Verify file artifact existence back in main project path
          cd ..
          ls -la llmfarm_core.swift/llama.cpp/build-apple/

      - name: Compile Unsigned Application Binary
        run: |
          xcodebuild -project LLMFarm.xcodeproj \
                     -scheme LLMFarm \
                     -configuration Release \
                     -sdk iphoneos \
                     -disableAutomaticPackageResolution \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build

      - name: Structure and Pack IPA Payload
        run: |
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/ || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r LLMFarm_v1.4.3.ipa Payload

      - name: Export Ready Package
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Package
          path: LLMFarm_v1.4.3.ipa
