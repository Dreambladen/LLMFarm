name: iPad Export
on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: macos-14
    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Force Deep Init Submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule deinit -f .
          git submodule update --init --recursive --force

      - name: Inject Pre-Compiled Frameworks
        run: |
          # Create the missing folders manually so Xcode stops throwing path errors
          mkdir -p swift-markdown-ui/NetworkImage
          mkdir -p llmfarm_core.swift/llama.cpp/build-apple/llama.xcframework
          touch swift-markdown-ui/NetworkImage/Package.swift
          touch llmfarm_core.swift/llama.cpp/build-apple/llama.xcframework/Info.plist

      - name: Compile Unsigned Application Binary
        run: |
          xcodebuild -project LLMFarm.xcodeproj \
                     -scheme LLMFarm \
                     -configuration Release \
                     -sdk iphoneos \
                     -disableAutomaticPackageResolution \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     ALLOW_MISSING_BINARY_ARTIFACTS=YES \
                     build

      - name: Structure and Pack IPA Payload
        run: |
          mkdir -p Payload
          find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d -exec cp -r {} Payload/ \; || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r LLMFarm_v1.4.3.ipa Payload

      - name: Export Ready Package
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Package
          path: LLMFarm_v1.4.3.ipa
