name: iPad Export
on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: macos-14
    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Hard Sync Submodule Directories
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Build C++ LLM Engine Binary From Source
        run: |
          brew install cmake go
          
          # Move directly into the native core directory
          cd llmfarm_core.swift/llama.cpp
          
          # Run the engine compilation from the developer's source configuration directory
          cmake -B build-apple -DCMAKE_TOOLCHAIN_FILE=../apple.toolchain.cmake -DPLATFORM=OS64 -G Xcode
          cd build-apple
          
          # Generate the missing framework structures directly into the target project mapping folder
          xcodebuild -archivePath llama.xcarchive -scheme llama build
          xcodebuild -create-xcframework -archive llama.xcarchive -framework llama.framework -output llama.xcframework

      - name: Compile Unsigned iPad Application
        run: |
          xcodebuild -project LLMFarm.xcodeproj \
                     -scheme LLMFarm \
                     -configuration Release \
                     -sdk iphoneos \
                     -disableAutomaticPackageResolution \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build

      - name: Structure and Pack IPA Payload
        run: |
          mkdir -p Payload
          find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d -exec cp -r {} Payload/ \; || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r LLMFarm_v1.4.3.ipa Payload

      - name: Export Ready Package
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Package
          path: LLMFarm_v1.4.3.ipa
