name: iPad Export
on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: macos-14
    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Force Fix Local Folder Tree Paths
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Compile Unsigned iPad Binary
        run: |
          xcodebuild -project LLMFarm.xcodeproj \
                     -scheme LLMFarm \
                     -configuration Release \
                     -sdk iphoneos \
                     -disableAutomaticPackageResolution \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     ALLOW_MISSING_BINARY_ARTIFACTS=YES \
                     ANY_BUNDLE_IDENTIFIER_ALLOWED=YES \
                     build

      - name: Structure and Pack IPA Payload
        run: |
          mkdir -p Payload
          find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d -exec cp -r {} Payload/ \; || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r LLMFarm_v1.4.3.ipa Payload

      - name: Export Ready Package
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Package
          path: LLMFarm_v1.4.3.ipa
