name: iPad Export
on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: macos-14
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean Project Configuration Files
        run: |
          rm -rf *.resolved
          rm -rf LLMFarm.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Isolated Dependency Fetch
        run: |
          xcodebuild -project LLMFarm.xcodeproj -scheme LLMFarm -resolvePackageDependencies -scmProvider system

      - name: Compile Unsigned iPad Binary
        run: |
          xcodebuild -project LLMFarm.xcodeproj \
                     -scheme LLMFarm \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build

      - name: Structure and Pack IPA Payload
        run: |
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/ || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r LLMFarm_v1.4.3.ipa Payload

      - name: Export Ready Package
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Package
          path: LLMFarm_v1.4.3.ipa
