name: iPad Export
on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: macos-14
    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Global Git Network Paths
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          echo -e "machine github.com\n login oauth2\n password ${{ secrets.GITHUB_TOKEN }}\n" > ~/.netrc
          echo -e "machine api.github.com\n login oauth2\n password ${{ secrets.GITHUB_TOKEN }}\n" >> ~/.netrc

      - name: Pre-Fetch Remote Dependencies
        run: |
          xcodebuild -project LLMFarm.xcodeproj -scheme LLMFarm -resolvePackageDependencies -scmProvider system

      - name: Compile Unsigned Application Binary
        run: |
          xcodebuild -project LLMFarm.xcodeproj \
                     -scheme LLMFarm \
                     -configuration Release \
                     -sdk iphoneos \
                     -scmProvider system \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     VALIDATE_WORKSPACE=NO \
                     build

      - name: Structure and Pack IPA Payload
        run: |
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/ || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r LLMFarm_v1.4.3.ipa Payload

      - name: Export Ready Package
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Package
          path: LLMFarm_v1.4.3.ipa
